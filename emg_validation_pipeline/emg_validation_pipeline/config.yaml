data:
  raw_dir: "./c3d_raw"
  output_dir: "./processed_dataset"
  allow_synthetic_when_empty: true
  synthetic_duration_s: 6.0
  target_muscles:
    - "L_BF"
    - "R_BF"
    - "L_RF"
    - "R_RF"
    - "L_VL"
    - "R_VL"
    - "L_TA"
    - "R_TA"
    - "L_GasM"
    - "R_GasM"
    - "R_ES"
  ignored_patterns: ["NA1", "NA2", "NA3", "NA4", "DELTOIDEUS", "BICEPS", "TRICEPS"]

signal_processing:
  emg_fs: 2000.0
  mocap_fs: 100.0
  bandpass_low: 20.0
  bandpass_high: 450.0
  notch_freq: 60.0
  notch_q: 30.0
  envelope_cutoff: 6.0
  filter_order: 4

qc_thresholds:
  dead_channel_ptp_v: 1e-5
  saturation_v: 0.0098
  saturation_allowed_pct: 0.01
  max_baseline_drift_v: 0.001
  abnormal_rms_max_v: 0.05
  sync_tolerance_s: 0.05
  export_failed_windows: false

normalization:
  strategy: "subject_maximum"
  percentile_value: 99.9
  mvc_dir: "./mvc_ref"

windowing:
  length_ms: 200
  stride_ms: 50
  anticipatory_horizon_ms: 300
  transition_margin_ms: 500

labels:
  isolated_activities: ["walk", "sit", "squat", "stair"]
  continuous_activities: ["all", "walk+squat+stair"]
  transition_recordings:
    all: ["walk", "sit", "squat", "stair"]
    walk+squat+stair: ["walk", "squat", "stair"]

plots:
  generate_all: true
  dpi: 150
  format: "svg"
